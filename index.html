<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        :root { --main-green: #2F855A; --light-green: #48BB78; --bg-color: #F0FDF4; --text-dark: #2D3748; }
        body { font-family: 'Pretendard', sans-serif; text-align: center; background-color: var(--bg-color); margin: 0; padding: 15px; color: var(--text-dark); }
        #app-container { max-width: 480px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 20px;}
        .app-header { background: linear-gradient(135deg, var(--main-green), var(--light-green)); color: white; padding: 20px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; margin-bottom: 15px;}
        .nav-container { padding: 0 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 20px; }
        .menu-btn { padding: 12px 2px; cursor: pointer; border: none; border-radius: 10px; background-color: #EDF2F7; color: #4A5568; font-weight: bold; font-size: 12px; }
        .menu-btn.active { background-color: var(--main-green); color: white; }
        .section { display: none; padding: 0 15px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .play-btn { background: #E6FFFA; border: 2px solid #81E6D9; color: #285E61; padding: 8px 15px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #word-display { font-size: 28px; font-weight: 900; color: var(--main-green); margin: 15px 0; min-height: 40px; }
        .option-btn { background: white; border: 2px solid #E2E8F0; padding: 14px; border-radius: 12px; font-size: 15px; cursor: pointer; text-align: left; font-weight: bold; margin-bottom: 8px; width: 100%; }
        .correct-btn { background-color: var(--light-green) !important; color: white !important; }
        .korean-meaning { font-size: 16px; color: #C53030; font-weight: bold; margin-bottom: 12px; background: #FFF5F5; padding: 12px; border-radius: 10px; border-left: 5px solid #F56565; text-align: left; line-height: 1.5; }
        #answer-area, #answer-area-2 { min-height: 110px; border: 2px dashed var(--main-green); background-color: #F9FAFB; margin-bottom: 10px; padding: 12px; border-radius: 15px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-content: center; }
        #scrambled-words, #scrambled-words-2 { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; min-height: 60px; }
        .word-block { background: white; border: 2px solid #CBD5E0; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .status-text { font-size: 12px; color: #718096; background: #EDF2F7; padding: 4px 10px; border-radius: 15px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .history-card { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 12px; margin-bottom: 8px; text-align: left; position: relative; }
        .stamp { position: absolute; right: 10px; top: 10px; color: #E53E3E; border: 2px solid #E53E3E; padding: 2px 5px; border-radius: 5px; transform: rotate(-10deg); font-weight: 900; font-size: 12px; }
        .jump-box { margin-bottom: 10px; font-size: 13px; color: #4A5568; }
        input { padding: 6px; border-radius: 6px; border: 1px solid #DDD; width: 45px; text-align: center; }
        .go-btn { padding: 6px 10px; background: var(--text-dark); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
<div id="app-container">
    <div class="app-header"><h1>🌳 수리나무 창원중3</h1><p style="margin-top:5px; font-size:13px; opacity:0.9;">1과 & 2과 본문 완벽 마스터</p></div>
    <div class="nav-container">
        <button class="menu-btn active" onclick="showSection('word-section', this)">어휘</button>

        <button class="menu-btn" onclick="showSection('unit2-section', this)">2과 본문</button>
        <button class="menu-btn" onclick="showSection('history-section', this); renderHistory();">기록</button>
    </div>

    <div id="history-section" class="section"><h3 style="font-size:18px;">📅 학습 기록</h3><div id="history-list"></div></div>
</div>

    let currentIdx = { word: 0, unit1: 0, unit2: 0 };
    let isLooping = false;
    let loopTimeout;

    // --- 기본 기능 ---
    function showSection(id, btn) {
        stopLooping();
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        if(id.includes('unit')) { isLooping = true; playLoop(id.replace('-section', '')); }
    }

    function jumpTo(type) {
        const val = parseInt(document.getElementById(type + 'Jump').value) - 1;
        const list = type === 'word' ? wordList : (type === 'unit1' ? unit1List : unit2List);
        if(val >= 0 && val < list.length) {
            currentIdx[type] = val;
            if(type === 'word') loadWord(); else loadSentence(type);
        }
    }

    function loadWord() {
        const q = wordList[currentIdx.word];
        document.getElementById('word-status').innerText = `어휘 ${currentIdx.word + 1} / ${wordList.length}`;
        document.getElementById('word-display').innerText = q.en;
        const optBox = document.getElementById('word-options'); optBox.innerHTML = '';
        let opts = [{t: q.ko, c: true}];
        while(opts.length < 4) {
            let r = wordList[Math.floor(Math.random()*wordList.length)].ko;
            if(!opts.find(o => o.t === r)) opts.push({t: r, c: false});
        }
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o.t;
            b.onclick = () => {
                if(o.c) { b.classList.add('correct-btn'); saveRecord('word'); setTimeout(() => { if(currentIdx.word+1 < wordList.length){currentIdx.word++; loadWord();} }, 400); }
                else alert("❌ 오답입니다!");
            };
            optBox.appendChild(b);
        });
        speak(q.en);
    }

    function loadSentence(type) {
        stopLooping();
        const list = type === 'unit1' ? unit1List : unit2List;
        const q = list[currentIdx[type]];
        const suffix = type === 'unit1' ? '' : '-2';
        document.getElementById(`${type}-status`).innerText = `${type==='unit1'?'1과':'2과'} 본문 ${currentIdx[type] + 1} / ${list.length}`;
        document.getElementById(`${type}-ko`).innerText = q.ko;
        const area = document.getElementById(`answer-area${suffix}`);
        const scrambled = document.getElementById(`scrambled-words${suffix}`);
        area.innerHTML = ''; scrambled.innerHTML = ''; area.style.background = '';
        
        let words = q.en.split(' ');
        let shuffled = [...words].sort(() => Math.random() - 0.5);
        shuffled.forEach(w => {
            const b = document.createElement('button'); b.className = 'word-block'; b.innerText = w;
            b.onclick = () => {
                if(b.parentElement === scrambled) area.appendChild(b); else scrambled.appendChild(b);
                if(scrambled.children.length === 0) {
                    if(Array.from(area.children).map(x => x.innerText).join(' ') === q.en) {
                        area.style.background = '#C6F6D5'; saveRecord(type); stopLooping(); speak(q.en);
                        setTimeout(() => { if(currentIdx[type]+1 < list.length) { currentIdx[type]++; loadSentence(type); } }, 1500);
                    } else { area.style.background = '#FED7D7'; setTimeout(() => area.style.background = '', 400); }
                }
            };
            scrambled.appendChild(b);
        });
        isLooping = true; playLoop(type);
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.8;
        window.speechSynthesis.speak(u); return u;
    }
    function playLoop(type) {
        if(!isLooping) return;
        const list = type === 'unit1' ? unit1List : unit2List;
        const u = speak(list[currentIdx[type]].en);
        u.onend = () => { if(isLooping) loopTimeout = setTimeout(() => playLoop(type), 2000); };
    }
    function stopLooping() { isLooping = false; clearTimeout(loopTimeout); window.speechSynthesis.cancel(); }
    function speakCurrent(type) { speak(wordList[currentIdx.word].en); }

    function saveRecord(type) {
        const d = new Date().toLocaleDateString();
        let h = JSON.parse(localStorage.getItem('surinamu_cw3')) || {};
        if(!h[d]) h[d] = {word:0, unit1:0, unit2:0};
        h[d][type]++; localStorage.setItem('surinamu_cw3', JSON.stringify(h));
    }
    function renderHistory() {
        const container = document.getElementById('history-list'); container.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('surinamu_cw3')) || {};
        Object.keys(h).sort().reverse().forEach(date => {
            const data = h[date]; const total = data.word + data.unit1 + data.unit2;
            const card = document.createElement('div'); card.className = 'history-card';
            card.innerHTML = `<div class="history-date">${date} ${total >= 20 ? '<span class="stamp">Good Job!</span>' : ''}</div>
                <div style="font-size:13px;">어휘: ${data.word} | 1과: ${data.unit1} | 2과: ${data.unit2}</div>`;
            container.appendChild(card);
        });
    }

    window.onload = () => { loadWord(); loadSentence('unit1'); loadSentence('unit2'); };
</script>
</body>
